services:
  # ── Backend API (Node.js / Express) ──────────────────────────
  - type: web
    name: inventory-optimizer-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000          # Render's default internal port
      - key: DATABASE_URL
        sync: false           # Set manually in Render dashboard → paste Neon URL
      - key: CORS_ORIGINS
        sync: false           # Set to your Vercel frontend URL after deploying frontend
